
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomic Bandits</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.10.1/lottie.min.js"></script>
  <style>
   
    #animation-wrapper {
    width: 100%;
    height: 600px;
    overflow: hidden;
    margin: 0 auto;
    position: relative;
    }

    #animation-container {
    position: absolute;
    top: -300px;      /* Shift up/down to change header position */
    left: -150px;        /* Shift left/right */
    transform: scale(2.25); /* Scale animation (1 = original size) */
    transform-origin: top left; /* Keeps position predictable when scaling */
    width: 500px;       /* Keep large enough so crop works */
    height: 500px;
    }

   #animation-link {
      text-decoration: none;
      color: inherit;
    }

</style>
</head>
<body>
  <a href="#" id="animation-link">
  <div id="animation-wrapper">
    <div id="animation-container"></div>
  </div>
</a>

    
  <script>
      var animation = lottie.loadAnimation({
    container: document.getElementById('animation-container'),
    renderer: 'svg',
    loop: false,
    autoplay: true,
    path: 'animation.json'
  });

  animation.addEventListener('complete', function () {
    // Go to the last frame and stop
    animation.goToAndStop(animation.totalFrames - 1, true);
  });
  </script>
</body>
</html>
