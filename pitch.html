
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomic Bandits</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.10.1/lottie.min.js"></script>
  <style>

 body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background-color: #ffffff;
    }

    
    .blog-post {
      margin-top: 40px;
    }

    h1, h2 {
      color: #333;
    }

    p {
      color: #555;
    }
    
#animation-wrapper {
  width: 100%;
  height: 600px;
  overflow: hidden;
  margin: 0 auto;

  display: flex;
  justify-content: center; /* horizontal center */
  align-items: center;     /* vertical center */
  position: relative;
}

#animation-container {
  transform: scale(2.25);
  transform-origin: center center; /* important for proper scaling */
  width: 500px;
  height: 500px;
}

   #animation-link {
      text-decoration: none;
      color: inherit;
    }

  .content-row {
  display: flex;
  align-items: flex-start; /* aligns top edges */
  gap: 20px; /* space between image and text */
}

.content-row img {
  max-width: 250px; /* control image size */
  height: auto;
}

.text-content {
  flex: 1; /* lets text take remaining space */
}

@media (max-width: 600px) {
  .content-row {
    flex-direction: column;
  }
}

</style>
</head>
<body>
  <a href="#" id="animation-link">
  <div id="animation-wrapper">
    <div id="animation-container"></div>
  </div>
</a>


<section class="blog-post">
  <div class="content-row">
    <img src="Jim.png" alt="A description of the image">
    
    <div class="text-content">
      <h1></h1>
      <p>This is me.</p>
    </div>
  </div>
</section>
    
  <script>
      var animation = lottie.loadAnimation({
    container: document.getElementById('animation-container'),
    renderer: 'svg',
    loop: false,
    autoplay: true,
    path: 'animation.json'
  });

  animation.addEventListener('complete', function () {
    // Go to the last frame and stop
    animation.goToAndStop(animation.totalFrames - 1, true);
  });
  </script>
</body>
</html>
